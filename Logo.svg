<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3957C6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D92B2B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F6C244;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="120" fill="#1a1a2e" rx="10"/>
  
  <!-- M for Myanmar -->
  <text x="30" y="80" font-family="Arial Black, sans-serif" font-size="60" font-weight="bold" fill="url(#grad1)">မြန်မာ</text>
  
  <!-- NLP text -->
  <text x="160" y="80" font-family="Courier New, monospace" font-size="40" font-weight="bold" fill="#ffffff">LNP</text>
  
  <!-- Dataset -->
  <text x="270" y="80" font-family="Arial, sans-serif" font-size="30" fill="#aaaaaa">Dataset</text>
  
  <!-- Star decoration -->
  <text x="380" y="30" font-size="20" fill="#FFD700">★</text>
  <text x="350" y="50" font-size="14" fill="#C0C0C0">◈</text>
  <text x="20" y="50" font-size="14" fill="#C0C0C0">◈</text>
</svg>